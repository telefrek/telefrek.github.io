# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

lang: en

timezone: America/New_York

# jekyll-seo-tag settings › https://github.com/jekyll/jekyll-seo-tag/blob/master/docs/usage.md

title: Telefrek

tagline: Innovative tech to take our customers to the top

description: >-
  Telefrek enables developers to build more quickly, correctly, and efficiently.

url: "https://telefrek.com"

github:
  username: telefrek

twitter:
  username: telefrek

social:
  name: Telefrek
  email: hello@telefrek.com
  links:
    - https://github.com/telefrek
    - https://twitter.com/telefrek
    - https://www.linkedin.com/company/telefrek
    - https://www.facebook.com/telefrektech
    - https://telefrek.medium.com

# Site Verification Settings
webmaster_verifications:
  google:
  bing:

# Web Analytics Settings
analytics:
  google:
    id:

# Force dark mode to match existing Telefrek branding
theme_mode: dark

# the avatar on sidebar, support local or CORS resources
avatar: /assets/img/avatar.png

# boolean type, the global switch for TOC in posts.
toc: true

comments:
  provider:

pwa:
  enabled: true
  cache:
    enabled: true

paginate: 10

baseurl: ""

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
